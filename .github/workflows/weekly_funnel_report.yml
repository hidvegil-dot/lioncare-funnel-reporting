name: Weekly Funnel HTML Report

on:
  schedule:
    # GitHub Actions schedules are UTC. This runs at both possible UTC
    # offsets for 07:00 Europe/Budapest, then the guard keeps only Monday 07:00 locally.
    - cron: "0 5,6 * * 1"
  workflow_dispatch:

concurrency:
  group: weekly-funnel-html-report
  cancel-in-progress: false

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Budapest
      GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
      GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
      GHL_BASE_URL: ${{ secrets.GHL_BASE_URL }}
      GHL_API_VERSION: ${{ secrets.GHL_API_VERSION }}
      GHL_USER_LABELS: ${{ secrets.GHL_USER_LABELS }}
      GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
      GA4_CREDENTIALS_PATH: ${{ github.workspace }}/ga4-service-account.json
      GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
      META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      META_CAMPAIGN_ID: ${{ secrets.META_CAMPAIGN_ID }}
      RCLONE_CONFIG_ONEDRIVE: ${{ secrets.RCLONE_CONFIG_ONEDRIVE }}
      ONEDRIVE_UPLOAD_ROOT_PATH: ${{ secrets.ONEDRIVE_UPLOAD_ROOT_PATH }}
      REPORT_DATA_STRICT: "true"
    steps:
      - name: Budapest Monday 07:00 guard
        id: budapest_time
        run: |
          local_offset="$(TZ=Europe/Budapest date +%z)"
          if [ "$local_offset" = "+0200" ]; then
            expected_schedule="0 5 * * 1"
          else
            expected_schedule="0 6 * * 1"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || { [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "$expected_schedule" ]; }; then
            echo "run_report=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_report=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.budapest_time.outputs.run_report == 'true'
      - uses: actions/setup-python@v5
        if: steps.budapest_time.outputs.run_report == 'true'
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
        if: steps.budapest_time.outputs.run_report == 'true'
      - name: Validate required secrets
        if: steps.budapest_time.outputs.run_report == 'true'
        run: |
          missing=0
          for name in \
            GHL_API_KEY \
            GHL_LOCATION_ID \
            GHL_BASE_URL \
            GA4_PROPERTY_ID \
            GA4_SERVICE_ACCOUNT_JSON \
            META_AD_ACCOUNT_ID \
            META_ACCESS_TOKEN \
            META_CAMPAIGN_ID
          do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing GitHub secret::$name is empty or not configured"
              missing=1
            elif [ "${!name}" = "$name" ]; then
              echo "::error title=Invalid GitHub secret::$name contains the literal placeholder value"
              missing=1
            fi
          done
          exit "$missing"
      - name: Write GA4 credentials
        if: steps.budapest_time.outputs.run_report == 'true'
        run: |
          printf '%s' "$GA4_SERVICE_ACCOUNT_JSON" > ga4-service-account.json
          chmod 600 ga4-service-account.json
          python -m json.tool ga4-service-account.json >/dev/null
      - name: Run weekly HTML report
        if: steps.budapest_time.outputs.run_report == 'true'
        run: python main.py --report-type weekly_compare
      - name: Verify weekly HTML report files
        if: steps.budapest_time.outputs.run_report == 'true'
        run: |
          test -s weekly_funnel_report.html
          test -s report_run.log
      - name: Upload weekly HTML report to OneDrive
        if: steps.budapest_time.outputs.run_report == 'true' && env.RCLONE_CONFIG_ONEDRIVE != ''
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONFIG_ONEDRIVE" > ~/.config/rclone/rclone.conf
          root_path="${ONEDRIVE_UPLOAD_ROOT_PATH:-ROAR/LionCare/riport}"
          rclone mkdir "onedrive:${root_path}/weekly"
          rclone copy weekly_funnel_report.html "onedrive:${root_path}/weekly"
      - name: Upload weekly HTML report artifacts
        if: steps.budapest_time.outputs.run_report == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-funnel-html-report
          if-no-files-found: error
          path: |
            weekly_funnel_report.html
            report_run.log
