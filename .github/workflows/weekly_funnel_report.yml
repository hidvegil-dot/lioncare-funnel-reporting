name: Weekly GHL Funnel Report

on:
  schedule:
    # GitHub Actions schedules are UTC. This runs at both possible UTC
    # offsets for 07:00 Europe/Budapest; the guard keeps only the active DST offset.
    - cron: "0 5 * * 1"
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      week_start:
        description: "Optional Monday week start in YYYY-MM-DD format. Empty means last completed week."
        required: false
        type: string
      week_end:
        description: "Optional week end in YYYY-MM-DD format. Empty means week_start + 6 days."
        required: false
        type: string

concurrency:
  group: weekly-ghl-funnel-report
  cancel-in-progress: false

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Budapest
      WEEK_START: ${{ inputs.week_start }}
      WEEK_END: ${{ inputs.week_end }}
      GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
      GHL_PRIVATE_INTEGRATION_TOKEN: ${{ secrets.GHL_PRIVATE_INTEGRATION_TOKEN }}
      GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
      GHL_BASE_URL: ${{ secrets.GHL_BASE_URL }}
      GHL_API_VERSION: ${{ secrets.GHL_API_VERSION }}
      GHL_USER_LABELS: ${{ secrets.GHL_USER_LABELS }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/google-service-account.json
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_DRIVE_ROOT_FOLDER_NAME: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_NAME }}
      DRIVE_UPLOAD_AUTH_MODE: oauth
      GOOGLE_DRIVE_OAUTH_TOKEN_PATH: ${{ github.workspace }}/google-drive-oauth-token.json
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_DRIVE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_DRIVE_OAUTH_TOKEN_JSON }}
      RCLONE_CONFIG_ONEDRIVE: ${{ secrets.RCLONE_CONFIG_ONEDRIVE }}
      ONEDRIVE_UPLOAD_ROOT_PATH: ${{ secrets.ONEDRIVE_UPLOAD_ROOT_PATH }}
      REPORT_HISTORY_ENABLED: "true"
      REPORT_DRIVE_UPLOAD_ENABLED: "true"
      REPORT_STORAGE_STRICT: "true"
      REPORT_DATA_STRICT: "true"
    steps:
      - name: Budapest Monday 07:00 guard
        id: budapest_time
        run: |
          local_offset="$(TZ=Europe/Budapest date +%z)"
          if [ "$local_offset" = "+0200" ]; then
            expected_schedule="0 5 * * 1"
          else
            expected_schedule="0 6 * * 1"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || { [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "$expected_schedule" ]; }; then
            echo "run_report=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_report=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.budapest_time.outputs.run_report == 'true'
      - uses: actions/setup-python@v5
        if: steps.budapest_time.outputs.run_report == 'true'
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
        if: steps.budapest_time.outputs.run_report == 'true'
      - name: Validate required secrets
        if: steps.budapest_time.outputs.run_report == 'true'
        run: |
          missing=0
          for name in \
            GHL_LOCATION_ID \
            GHL_BASE_URL \
            GOOGLE_SERVICE_ACCOUNT_JSON \
            GOOGLE_SHEET_ID \
            GOOGLE_DRIVE_ROOT_FOLDER_NAME \
            GOOGLE_DRIVE_OAUTH_TOKEN_JSON
          do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing GitHub secret::$name is empty or not configured"
              missing=1
            elif [ "${!name}" = "$name" ]; then
              echo "::error title=Invalid GitHub secret::$name contains the literal placeholder value"
              missing=1
            fi
          done
          if [ -z "${GHL_API_KEY:-}" ] && [ -z "${GHL_PRIVATE_INTEGRATION_TOKEN:-}" ]; then
            echo "::error title=Missing GitHub secret::GHL_API_KEY or GHL_PRIVATE_INTEGRATION_TOKEN is required"
            missing=1
          fi
          exit "$missing"
      - name: Write Google credentials
        if: steps.budapest_time.outputs.run_report == 'true'
        run: |
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > google-service-account.json
          printf '%s' "$GOOGLE_DRIVE_OAUTH_TOKEN_JSON" > google-drive-oauth-token.json
          chmod 600 google-service-account.json google-drive-oauth-token.json
          python -m json.tool google-service-account.json >/dev/null
          python -m json.tool google-drive-oauth-token.json >/dev/null
      - name: Run weekly GHL report
        if: steps.budapest_time.outputs.run_report == 'true'
        run: |
          args=()
          if [ -n "${WEEK_START:-}" ]; then
            args+=(--week-start "$WEEK_START")
          fi
          if [ -n "${WEEK_END:-}" ]; then
            args+=(--week-end "$WEEK_END")
          fi
          python weekly_ghl_report.py "${args[@]}"
      - name: Verify weekly GHL report files
        if: steps.budapest_time.outputs.run_report == 'true'
        run: |
          test -s weekly_ghl_funnel_report.html
          test -s weekly_ghl_funnel_report.csv
          test -s weekly_ghl_ceo_summary.md
          test -s weekly_report_run.log
      - name: Upload weekly GHL reports to OneDrive
        if: steps.budapest_time.outputs.run_report == 'true' && env.RCLONE_CONFIG_ONEDRIVE != ''
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONFIG_ONEDRIVE" > ~/.config/rclone/rclone.conf
          root_path="${ONEDRIVE_UPLOAD_ROOT_PATH:-ROAR/LionCare/riport}"
          rclone mkdir "onedrive:${root_path}/weekly"
          rclone copy weekly_ghl_funnel_report.html "onedrive:${root_path}/weekly"
          rclone copy weekly_ghl_funnel_report.csv "onedrive:${root_path}/weekly"
          rclone copy weekly_ghl_ceo_summary.md "onedrive:${root_path}/weekly"
      - name: Upload weekly GHL report artifacts
        if: steps.budapest_time.outputs.run_report == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-ghl-funnel-report
          if-no-files-found: error
          path: |
            weekly_ghl_funnel_report.html
            weekly_ghl_funnel_report.csv
            weekly_ghl_ceo_summary.md
            weekly_report_run.log
