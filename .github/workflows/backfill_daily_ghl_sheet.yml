name: Backfill Daily GHL Sheet

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Backfill start date in YYYY-MM-DD format."
        required: true
        type: string
      end_date:
        description: "Backfill end date in YYYY-MM-DD format."
        required: true
        type: string

concurrency:
  group: backfill-daily-ghl-sheet
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Budapest
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      START_DATE: ${{ inputs.start_date }}
      END_DATE: ${{ inputs.end_date }}
      GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
      GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
      GHL_BASE_URL: ${{ secrets.GHL_BASE_URL }}
      GHL_API_VERSION: ${{ secrets.GHL_API_VERSION }}
      GHL_USER_LABELS: ${{ secrets.GHL_USER_LABELS }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/google-service-account.json
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      REPORT_HISTORY_ENABLED: "true"
      REPORT_DRIVE_UPLOAD_ENABLED: "false"
      REPORT_STORAGE_STRICT: "true"
      REPORT_DATA_STRICT: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Validate required secrets
        run: |
          missing=0
          for name in \
            GHL_API_KEY \
            GHL_LOCATION_ID \
            GHL_BASE_URL \
            GOOGLE_SERVICE_ACCOUNT_JSON \
            GOOGLE_SHEET_ID
          do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing GitHub secret::$name is empty or not configured"
              missing=1
            elif [ "${!name}" = "$name" ]; then
              echo "::error title=Invalid GitHub secret::$name contains the literal placeholder value"
              missing=1
            fi
          done
          exit "$missing"
      - name: Write Google credentials
        run: |
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > google-service-account.json
          chmod 600 google-service-account.json
          python -m json.tool google-service-account.json >/dev/null
      - name: Backfill daily GHL Sheet rows
        run: |
          python scripts/backfill_daily_ghl_sheet.py \
            --start-date "$START_DATE" \
            --end-date "$END_DATE"
      - name: Upload backfill logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-daily-ghl-sheet
          if-no-files-found: ignore
          path: |
            backfill_daily_ghl_sheet.log
