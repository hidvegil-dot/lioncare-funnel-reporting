name: Backfill Daily GHL Sheet

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Backfill start date in YYYY-MM-DD format."
        required: true
        type: string
      end_date:
        description: "Backfill end date in YYYY-MM-DD format."
        required: true
        type: string

concurrency:
  group: backfill-daily-ghl-sheet
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Budapest
      START_DATE: ${{ inputs.start_date }}
      END_DATE: ${{ inputs.end_date }}
      GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
      GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
      GHL_BASE_URL: ${{ secrets.GHL_BASE_URL }}
      GHL_API_VERSION: ${{ secrets.GHL_API_VERSION }}
      GHL_USER_LABELS: ${{ secrets.GHL_USER_LABELS }}
      GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
      GA4_CREDENTIALS_PATH: ${{ github.workspace }}/ga4-service-account.json
      META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      META_CAMPAIGN_ID: ${{ secrets.META_CAMPAIGN_ID }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/google-service-account.json
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
      REPORT_HISTORY_ENABLED: "true"
      REPORT_DRIVE_UPLOAD_ENABLED: "false"
      REPORT_STORAGE_STRICT: "true"
      REPORT_DATA_STRICT: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Validate required secrets
        run: |
          missing=0
          for name in \
            GHL_API_KEY \
            GHL_LOCATION_ID \
            GHL_BASE_URL \
            GA4_PROPERTY_ID \
            GA4_SERVICE_ACCOUNT_JSON \
            META_AD_ACCOUNT_ID \
            META_ACCESS_TOKEN \
            META_CAMPAIGN_ID \
            GOOGLE_SERVICE_ACCOUNT_JSON \
            GOOGLE_SHEET_ID
          do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing GitHub secret::$name is empty or not configured"
              missing=1
            elif [ "${!name}" = "$name" ]; then
              echo "::error title=Invalid GitHub secret::$name contains the literal placeholder value"
              missing=1
            fi
          done
          exit "$missing"
      - name: Write Google credentials
        run: |
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > google-service-account.json
          printf '%s' "$GA4_SERVICE_ACCOUNT_JSON" > ga4-service-account.json
          chmod 600 google-service-account.json ga4-service-account.json
          python -m json.tool google-service-account.json >/dev/null
          python -m json.tool ga4-service-account.json >/dev/null
      - name: Backfill daily GHL Sheet rows
        run: |
          python - <<'PY'
          import os
          import subprocess
          from datetime import datetime, timedelta

          start = datetime.strptime(os.environ["START_DATE"], "%Y-%m-%d").date()
          end = datetime.strptime(os.environ["END_DATE"], "%Y-%m-%d").date()
          if end < start:
              raise SystemExit("END_DATE must be later than or equal to START_DATE")

          current = start
          while current <= end:
              day = current.isoformat()
              print(f"::group::Backfill {day}", flush=True)
              subprocess.run(
                  [
                      "python",
                      "main.py",
                      "--report-type",
                      "daily",
                      "--start-date",
                      day,
                      "--end-date",
                      day,
                  ],
                  check=True,
              )
              print("::endgroup::", flush=True)
              current += timedelta(days=1)
          PY
      - name: Upload backfill logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-daily-ghl-sheet
          if-no-files-found: ignore
          path: |
            report_run.log
            archive/*.html
            archive/*.csv
