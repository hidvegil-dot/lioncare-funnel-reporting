name: Fireflies Client Communication AI

on:
  schedule:
    # 07:00 Europe/Budapest. GitHub Actions uses UTC; these two UTC hours cover CET/CEST.
    - cron: "0 5 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: "How many hours of Fireflies transcripts to inspect."
        required: false
        default: "24"
        type: string
      mock_openai:
        description: "Use mock AI output to test Fireflies -> Drive -> Sheet without OpenAI API quota."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      force_reprocess:
        description: "Reprocess meetings even if meeting_ai_log already has a SUCCESS row."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: fireflies-client-communication-ai
  cancel-in-progress: false

jobs:
  meeting-ai:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Budapest
      FIREFLIES_API_KEY: ${{ secrets.FIREFLIES_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/google-service-account.json
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_DRIVE_ROOT_FOLDER_NAME: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_NAME }}
      DRIVE_UPLOAD_AUTH_MODE: oauth
      GOOGLE_DRIVE_OAUTH_TOKEN_PATH: ${{ github.workspace }}/google-drive-oauth-token.json
      GOOGLE_DRIVE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_DRIVE_OAUTH_TOKEN_JSON }}
      GHL_WRITE_NOTES_ENABLED: "false"
      GHL_CREATE_TASKS_ENABLED: "false"
      EMAIL_DRAFT_ENABLED: "false"
      RAW_TRANSCRIPT_SAVE_ENABLED: "true"
      MEETING_AI_MOCK_OPENAI_ENABLED: ${{ inputs.mock_openai || 'false' }}
      MEETING_AI_FORCE_REPROCESS: ${{ inputs.force_reprocess || 'false' }}
    steps:
      - name: Budapest 07:00 guard
        id: budapest_time
        run: |
          local_offset="$(TZ=Europe/Budapest date +%z)"
          if [ "$local_offset" = "+0200" ]; then
            expected_schedule="0 5 * * *"
          else
            expected_schedule="0 6 * * *"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_meeting_ai=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "$expected_schedule" ]; then
            echo "run_meeting_ai=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_meeting_ai=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip inactive or delayed schedule
        if: steps.budapest_time.outputs.run_meeting_ai != 'true'
        run: |
          echo "::notice title=Inactive Fireflies schedule::Skipping delayed or inactive schedule. event=${{ github.event_name }} schedule=${{ github.event.schedule }}"
      - uses: actions/checkout@v4
        if: steps.budapest_time.outputs.run_meeting_ai == 'true'
      - uses: actions/setup-python@v5
        if: steps.budapest_time.outputs.run_meeting_ai == 'true'
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
        if: steps.budapest_time.outputs.run_meeting_ai == 'true'
      - name: Validate required secrets
        if: steps.budapest_time.outputs.run_meeting_ai == 'true'
        run: |
          missing=0
          for name in FIREFLIES_API_KEY OPENAI_API_KEY GOOGLE_SHEET_ID; do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing GitHub secret::$name is empty or not configured"
              missing=1
            fi
          done
          if [ -z "${GOOGLE_APPLICATION_CREDENTIALS_JSON:-}" ] && [ -z "${GOOGLE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "::error title=Missing GitHub secret::GOOGLE_APPLICATION_CREDENTIALS_JSON or GOOGLE_SERVICE_ACCOUNT_JSON is required"
            missing=1
          fi
          if [ -z "${GOOGLE_DRIVE_OAUTH_TOKEN_JSON:-}" ]; then
            echo "::error title=Missing GitHub secret::GOOGLE_DRIVE_OAUTH_TOKEN_JSON is required for Drive memory uploads"
            missing=1
          fi
          exit "$missing"
      - name: Write Google credentials
        if: steps.budapest_time.outputs.run_meeting_ai == 'true'
        run: |
          if [ -n "${GOOGLE_APPLICATION_CREDENTIALS_JSON:-}" ]; then
            printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > google-service-account.json
          else
            printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > google-service-account.json
          fi
          printf '%s' "$GOOGLE_DRIVE_OAUTH_TOKEN_JSON" > google-drive-oauth-token.json
          chmod 600 google-service-account.json google-drive-oauth-token.json
          python -m json.tool google-service-account.json >/dev/null
          python -m json.tool google-drive-oauth-token.json >/dev/null
      - name: Check Google Drive OAuth token
        id: drive_oauth
        if: steps.budapest_time.outputs.run_meeting_ai == 'true'
        run: |
          python - <<'PY'
          import os
          import sys
          from google.auth.exceptions import RefreshError
          from google_drive_client import GoogleDriveClient

          github_output = os.environ["GITHUB_OUTPUT"]
          try:
              GoogleDriveClient.from_oauth_token("google-drive-oauth-token.json")
          except RefreshError as exc:
              print(f"::warning title=Expired Google Drive OAuth token::{exc}")
              with open(github_output, "a", encoding="utf-8") as output:
                  output.write("valid=false\n")
              sys.exit(0)
          except Exception as exc:
              print(f"::warning title=Invalid Google Drive OAuth token::{exc}")
              with open(github_output, "a", encoding="utf-8") as output:
                  output.write("valid=false\n")
              sys.exit(0)
          else:
              with open(github_output, "a", encoding="utf-8") as output:
                  output.write("valid=true\n")
          PY
      - name: Skip Meeting AI until Drive OAuth is renewed
        if: steps.budapest_time.outputs.run_meeting_ai == 'true' && steps.drive_oauth.outputs.valid != 'true'
        run: |
          echo "::notice title=Meeting AI skipped::Google Drive OAuth token is expired or revoked. Renew GOOGLE_DRIVE_OAUTH_TOKEN_JSON, then run this workflow manually."
      - name: Run meeting AI batch
        if: steps.budapest_time.outputs.run_meeting_ai == 'true' && steps.drive_oauth.outputs.valid == 'true'
        run: |
          python run_fireflies_meeting_ai.py \
            --lookback-hours "${{ inputs.lookback_hours || '24' }}"
      - name: Verify meeting AI log
        if: steps.budapest_time.outputs.run_meeting_ai == 'true' && steps.drive_oauth.outputs.valid == 'true'
        run: |
          test -s meeting_ai_run.log
      - name: Upload meeting AI logs
        if: steps.budapest_time.outputs.run_meeting_ai == 'true' && steps.drive_oauth.outputs.valid == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: meeting-ai-run
          if-no-files-found: ignore
          path: meeting_ai_run.log
