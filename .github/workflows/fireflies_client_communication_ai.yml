name: Fireflies Client Communication AI

on:
  schedule:
    # 07:00 Europe/Budapest. GitHub Actions uses UTC; these two UTC hours cover CET/CEST.
    - cron: "0 5,6 * * *"
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: "How many hours of Fireflies transcripts to inspect."
        required: false
        default: "24"
        type: string
      mock_openai:
        description: "Use mock AI output to test Fireflies -> Drive -> Sheet without OpenAI API quota."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      force_reprocess:
        description: "Reprocess meetings even if meeting_ai_log already has a SUCCESS row."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: fireflies-client-communication-ai
  cancel-in-progress: false

jobs:
  meeting-ai:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Budapest
      FIREFLIES_API_KEY: ${{ secrets.FIREFLIES_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/google-service-account.json
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_DRIVE_ROOT_FOLDER_NAME: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_NAME }}
      DRIVE_UPLOAD_AUTH_MODE: oauth
      GOOGLE_DRIVE_OAUTH_TOKEN_PATH: ${{ github.workspace }}/google-drive-oauth-token.json
      GOOGLE_DRIVE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_DRIVE_OAUTH_TOKEN_JSON }}
      GHL_WRITE_NOTES_ENABLED: "false"
      GHL_CREATE_TASKS_ENABLED: "false"
      EMAIL_DRAFT_ENABLED: "false"
      RAW_TRANSCRIPT_SAVE_ENABLED: "true"
      MEETING_AI_MOCK_OPENAI_ENABLED: ${{ inputs.mock_openai || 'false' }}
      MEETING_AI_FORCE_REPROCESS: ${{ inputs.force_reprocess || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Validate required secrets
        run: |
          missing=0
          for name in FIREFLIES_API_KEY OPENAI_API_KEY GOOGLE_SHEET_ID; do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing GitHub secret::$name is empty or not configured"
              missing=1
            fi
          done
          if [ -z "${GOOGLE_APPLICATION_CREDENTIALS_JSON:-}" ] && [ -z "${GOOGLE_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "::error title=Missing GitHub secret::GOOGLE_APPLICATION_CREDENTIALS_JSON or GOOGLE_SERVICE_ACCOUNT_JSON is required"
            missing=1
          fi
          if [ -z "${GOOGLE_DRIVE_OAUTH_TOKEN_JSON:-}" ]; then
            echo "::error title=Missing GitHub secret::GOOGLE_DRIVE_OAUTH_TOKEN_JSON is required for Drive memory uploads"
            missing=1
          fi
          exit "$missing"
      - name: Write Google credentials
        run: |
          if [ -n "${GOOGLE_APPLICATION_CREDENTIALS_JSON:-}" ]; then
            printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > google-service-account.json
          else
            printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > google-service-account.json
          fi
          printf '%s' "$GOOGLE_DRIVE_OAUTH_TOKEN_JSON" > google-drive-oauth-token.json
          chmod 600 google-service-account.json google-drive-oauth-token.json
          python -m json.tool google-service-account.json >/dev/null
          python -m json.tool google-drive-oauth-token.json >/dev/null
      - name: Run meeting AI batch
        run: |
          local_offset="$(TZ=Europe/Budapest date +%z)"
          if [ "$local_offset" = "+0200" ]; then
            expected_schedule="0 5 * * *"
          else
            expected_schedule="0 6 * * *"
          fi
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" != "$expected_schedule" ]; then
            echo "Skipping duplicate UTC schedule outside Budapest 07:00. schedule=${{ github.event.schedule }} expected=${expected_schedule}"
            exit 0
          fi
          python run_fireflies_meeting_ai.py \
            --lookback-hours "${{ inputs.lookback_hours || '24' }}"
      - name: Verify meeting AI log
        if: always()
        run: |
          local_offset="$(TZ=Europe/Budapest date +%z)"
          if [ "$local_offset" = "+0200" ]; then
            expected_schedule="0 5 * * *"
          else
            expected_schedule="0 6 * * *"
          fi
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" != "$expected_schedule" ]; then
            exit 0
          fi
          test -s meeting_ai_run.log
      - name: Upload meeting AI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: meeting-ai-run
          if-no-files-found: ignore
          path: meeting_ai_run.log
