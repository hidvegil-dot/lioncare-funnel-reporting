name: Inspect GHL Workflow Email Content

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Budapest
      GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
      GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
      GHL_BASE_URL: ${{ secrets.GHL_BASE_URL }}
      GHL_API_VERSION: ${{ secrets.GHL_API_VERSION }}
      REPORT_DATA_STRICT: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Inspect GHL workflow email/date content
        run: python scripts/inspect_ghl_workflow_email_content.py
