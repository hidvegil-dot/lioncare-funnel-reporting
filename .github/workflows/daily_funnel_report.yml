name: Daily Funnel Report

on:
  schedule:
    # GitHub Actions schedules are UTC. This runs at both possible UTC
    # offsets for 05:59 Europe/Budapest. The guard below allows a wider
    # local window because GitHub scheduled runs can start late.
    - cron: "59 3,4 * * *"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Optional report date in YYYY-MM-DD format. Empty means yesterday in Europe/Budapest."
        required: false
        type: string

concurrency:
  group: daily-funnel-report
  cancel-in-progress: false

jobs:
  daily-report:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Budapest
      REPORT_DATE: ${{ inputs.report_date }}
      GHL_API_KEY: ${{ secrets.GHL_API_KEY }}
      GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
      GHL_BASE_URL: ${{ secrets.GHL_BASE_URL }}
      GHL_API_VERSION: ${{ secrets.GHL_API_VERSION }}
      GHL_USER_LABELS: ${{ secrets.GHL_USER_LABELS }}
      GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
      GA4_CREDENTIALS_PATH: ${{ github.workspace }}/ga4-service-account.json
      META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      META_CAMPAIGN_ID: ${{ secrets.META_CAMPAIGN_ID }}
      GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/google-service-account.json
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_DRIVE_ROOT_FOLDER_NAME: ${{ secrets.GOOGLE_DRIVE_ROOT_FOLDER_NAME }}
      DRIVE_UPLOAD_AUTH_MODE: oauth
      GOOGLE_DRIVE_OAUTH_CLIENT_SECRET_PATH: ${{ github.workspace }}/google-drive-oauth-client-secret.json
      GOOGLE_DRIVE_OAUTH_TOKEN_PATH: ${{ github.workspace }}/google-drive-oauth-token.json
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
      GOOGLE_DRIVE_OAUTH_CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_DRIVE_OAUTH_CLIENT_SECRET_JSON }}
      GOOGLE_DRIVE_OAUTH_TOKEN_JSON: ${{ secrets.GOOGLE_DRIVE_OAUTH_TOKEN_JSON }}
      RCLONE_CONFIG_ONEDRIVE: ${{ secrets.RCLONE_CONFIG_ONEDRIVE }}
      ONEDRIVE_UPLOAD_ROOT_PATH: ${{ secrets.ONEDRIVE_UPLOAD_ROOT_PATH }}
      REPORT_HISTORY_ENABLED: "true"
      REPORT_DRIVE_UPLOAD_ENABLED: "true"
      REPORT_STORAGE_STRICT: "true"
      REPORT_DATA_STRICT: "true"
    steps:
      - name: Budapest 05:59 guard
        id: budapest_time
        run: |
          local_offset="$(TZ=Europe/Budapest date +%z)"
          if [ "$local_offset" = "+0200" ]; then
            expected_schedule="59 3 * * *"
          else
            expected_schedule="59 4 * * *"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || { [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "$expected_schedule" ]; }; then
            echo "run_report=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_report=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.budapest_time.outputs.run_report == 'true'
      - uses: actions/setup-python@v5
        if: steps.budapest_time.outputs.run_report == 'true'
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
        if: steps.budapest_time.outputs.run_report == 'true'
      - name: Validate required secrets
        if: steps.budapest_time.outputs.run_report == 'true'
        run: |
          missing=0
          for name in \
            GHL_API_KEY \
            GHL_LOCATION_ID \
            GHL_BASE_URL \
            GA4_PROPERTY_ID \
            GA4_SERVICE_ACCOUNT_JSON \
            META_AD_ACCOUNT_ID \
            META_ACCESS_TOKEN \
            META_CAMPAIGN_ID \
            GOOGLE_SERVICE_ACCOUNT_JSON \
            GOOGLE_SHEET_ID \
            GOOGLE_DRIVE_ROOT_FOLDER_NAME \
            GOOGLE_DRIVE_OAUTH_CLIENT_SECRET_JSON \
            GOOGLE_DRIVE_OAUTH_TOKEN_JSON
          do
            if [ -z "${!name:-}" ]; then
              echo "::error title=Missing GitHub secret::$name is empty or not configured"
              missing=1
            elif [ "${!name}" = "$name" ]; then
              echo "::error title=Invalid GitHub secret::$name contains the literal placeholder value"
              missing=1
            fi
          done
          exit "$missing"
      - name: Write Google credentials
        if: steps.budapest_time.outputs.run_report == 'true'
        run: |
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > google-service-account.json
          printf '%s' "$GA4_SERVICE_ACCOUNT_JSON" > ga4-service-account.json
          printf '%s' "$GOOGLE_DRIVE_OAUTH_CLIENT_SECRET_JSON" > google-drive-oauth-client-secret.json
          printf '%s' "$GOOGLE_DRIVE_OAUTH_TOKEN_JSON" > google-drive-oauth-token.json
          chmod 600 google-service-account.json ga4-service-account.json google-drive-oauth-client-secret.json google-drive-oauth-token.json
          python -m json.tool google-service-account.json >/dev/null
          python -m json.tool ga4-service-account.json >/dev/null
          python -m json.tool google-drive-oauth-client-secret.json >/dev/null
          python -m json.tool google-drive-oauth-token.json >/dev/null
      - name: Run daily report
        if: steps.budapest_time.outputs.run_report == 'true'
        run: |
          if [ -n "${REPORT_DATE:-}" ]; then
            python main.py --report-type daily --start-date "$REPORT_DATE" --end-date "$REPORT_DATE"
          else
            python run_daily_funnel_report.py
          fi
      - name: Upload reports to OneDrive
        if: steps.budapest_time.outputs.run_report == 'true' && env.RCLONE_CONFIG_ONEDRIVE != ''
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONFIG_ONEDRIVE" > ~/.config/rclone/rclone.conf
          root_path="${ONEDRIVE_UPLOAD_ROOT_PATH:-ROAR/LionCare/riport}"
          report_date="${REPORT_DATE:-$(TZ=Europe/Budapest date -d yesterday +%F)}"
          year="${report_date:0:4}"
          month="${report_date:5:2}"
          daily_path="${root_path}/daily/${year}/${month}/${report_date}"
          rclone mkdir "onedrive:${daily_path}"
          rclone copyto "archive/daily_funnel_report_${report_date}.html" "onedrive:${daily_path}/daily_funnel_report.html"
          rclone copyto "archive/daily_funnel_report_${report_date}.csv" "onedrive:${daily_path}/daily_funnel_report.csv"
      - name: Upload report artifacts
        if: steps.budapest_time.outputs.run_report == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-funnel-report
          if-no-files-found: ignore
          path: |
            daily_funnel_report.html
            daily_funnel_report.csv
            report_run.log
